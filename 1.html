        <h1>世界说明书</h1>
        <p>
            树木的五种部分就像五种元素，种子代表终结后的萌芽与起点，枝干代表前进与准则，<br>
            树叶代表沟通与互助，花朵代表展现与表达，果实代表收束与完满。
        </p>
        <p1>
            基于这样的理念，世界中的子民分为五个种族（此处所指的子民包括非生物、植物与动<br>
            物），它们各自有各自的生态与结构，也具备不同的理念、遵循着不同的生长与演变规<br>
            律。
        </p1>
