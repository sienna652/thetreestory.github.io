        <h1>洼骸地区</h1>
        <p1>
            洼骸地区位于世界中部，是一片孤立而狭长的陆地，在西北方向上与涅尔斐亚南部地<br>
            区隔海峡与群岛相望，在正南方向与耶尼西北部地区接壤，二者之间隔着一片沙地。<br>
            洼骸地区的主要文明是枝种族的米德戈里，该文明信仰着独一的神明伊密，信徒们称<br>
            其为伊。伊代表了枝最崇高的理念：对笔直周正的追求、对正确公平的期许。枝族生<br>
            物不具备生理性别，她们皆是伊亲生的孩子，每年伊会将新生的孩童送往世间，而成<br>
            熟的枝人会肩负起抚养的责任。因而枝人有对伊的天然崇拜，而枝人的平均寿命通常<br>
            在270-300岁之间，为最长寿的种族。<br>
        </p1>
