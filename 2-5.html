        <h1>兰也若</h1>
        <p1>
            兰也若是迟之刻的随从，在天象创立之前就跟随迟之刻游历，天象建立后也悉心躬耕。<br>
            负责的工作是外交合作。在天象的某次重大事件中，他险些因暗箭而亡，迟之刻与其<br>
            互换身体而免其灾难。<br>
        </p1>
