        <p1>树的世界分为四个陆域：代表花的涅尔斐亚，代表果的旋倾，代表枝的洼骸，代表种的耶尼西。<br>
            叶的种族没有自己独立的区域与王国，它们通常与其他种族生活在一起。叶多的地方会影响当地<br>
            原本的生态与文明。<br>
            除却有名有姓的陆域以外，其余区域为海洋或尚未形成文明、尚未被文明发现的区域。人们时至<br>
            今日依旧渴望对其展开探索。<br>
        </p1>
