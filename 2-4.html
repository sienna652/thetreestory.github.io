        <h1>迟之刻</h1>
        <p1>
            迟之刻是天象的其中一位创始人。她是少有的雌雄同体者，绝大部分时间维持着女身，<br>
            寿命很长，其来历难以考证，据说是多洪的东部地区之海神所化，代表自然对人类的施<br>
            压；也有观点称其为救人于水火的神女，能够操控潮涨潮退。然而不论人们信任哪种说<br>
            法，在真正与其接触时都会觉得不真实。她像一位随和而理性的高知人士，给人不怒自<br>
            威的印象。<br>
        </p1>
