        <p1>
            霍白是天象的创始人之一。其祖先曾经跟随康斯塔朋完成统一事业，而她也同样是兵<br>
            家出身，早年是军人，后来在祖母临终之际受其提点，又觉得维护和平与稳定需要个<br>
            体亲力亲为，所以弃武从医，以家族的名誉提议建立天象以对接中央地区。<br>
